name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v1.2.6

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            slug: windows-x64
            os: windows-2025
            command: npm run build:web:win:x64
            files: |
              dist/nsis-web/*-web-setup.exe
              dist/nsis-web/*.nsis.7z
              dist/nsis-web/latest.yml
          - name: macOS Intel
            slug: macos-x64
            os: macos-15-intel
            command: npm run build:slim:mac:x64
            files: |
              dist/*-macos-x64.dmg
              dist/*-macos-x64.dmg.blockmap
          - name: macOS Apple Silicon
            slug: macos-arm64
            os: macos-15
            command: npm run build:slim:mac:arm64
            files: |
              dist/*-macos-arm64.dmg
              dist/*-macos-arm64.dmg.blockmap
          - name: Linux x64
            slug: linux-x64
            os: ubuntu-24.04
            command: npm run build:linux:x64
            files: |
              dist/*-linux-x64.AppImage
              dist/*-linux-x64.AppImage.blockmap
              dist/latest-linux.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm install

      - name: Clean build output
        shell: bash
        run: rm -rf dist build/bundle

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.command }}

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "MuxMelt $RELEASE_TAG" \
              --notes "Automated cross-platform MuxMelt builds."

      - name: Create checksums
        env:
          FILES: ${{ matrix.files }}
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          checksum_file="dist/MuxMelt-${version}-${{ matrix.slug }}.sha256.txt"
          echo "CHECKSUM_FILE=$checksum_file" >> "$GITHUB_ENV"
          : > "$checksum_file"
          hash_cmd="sha256sum"
          command -v shasum >/dev/null 2>&1 && hash_cmd="shasum -a 256"
          while IFS= read -r pattern; do
            [ -n "$pattern" ] || continue
            for match in $pattern; do
              [ -f "$match" ] && $hash_cmd "$match" >> "$checksum_file"
            done
          done <<< "$FILES"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          FILES: ${{ matrix.files }}
        shell: bash
        run: |
          while IFS= read -r pattern; do
            [ -n "$pattern" ] || continue
            for match in $pattern; do
              [ -f "$match" ] && gh release upload "$RELEASE_TAG" "$match" --clobber
            done
          done <<< "$FILES"
          gh release upload "$RELEASE_TAG" "$CHECKSUM_FILE" --clobber

      # macOS builds run on per-arch runners (each bundles the runner-arch
      # ffmpeg), so each produces a single-arch latest-mac.yml. Stash them as
      # artifacts; the macos-update-feed job merges them into one feed.
      - name: Stash macOS update feed
        if: startsWith(matrix.slug, 'macos-')
        uses: actions/upload-artifact@v4
        with:
          name: mac-feed-${{ matrix.slug }}
          path: dist/latest-mac.yml
          if-no-files-found: error

  macos-update-feed:
    name: macOS update feed
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download per-arch mac feeds
        uses: actions/download-artifact@v4
        with:
          pattern: mac-feed-*
          path: mac-feeds

      - name: Merge into a single latest-mac.yml and upload
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          npm install js-yaml --no-save
          node .github/scripts/merge-mac-feed.js mac-feeds dist/latest-mac.yml
          gh release upload "$RELEASE_TAG" dist/latest-mac.yml --clobber
