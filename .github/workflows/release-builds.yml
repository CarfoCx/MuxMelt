name: Release Builds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v1.1.0

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-15-intel
            command: npm run build:slim:mac:x64
            files: |
              dist/MuxMelt-macOS-x64.dmg
              dist/MuxMelt-macOS-x64.dmg.blockmap
          - name: macOS Apple Silicon
            os: macos-15
            command: npm run build:slim:mac:arm64
            files: |
              dist/MuxMelt-macOS-arm64.dmg
              dist/MuxMelt-macOS-arm64.dmg.blockmap
          - name: Linux x64
            os: ubuntu-24.04
            command: npm run build:linux:x64
            files: |
              dist/MuxMelt-Slim-Linux.AppImage
              dist/MuxMelt-Slim-Linux.AppImage.blockmap
              dist/latest-linux.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm install

      - name: Clean build output
        shell: bash
        run: rm -rf dist build/bundle

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.command }}

      - name: Create checksums
        env:
          FILES: ${{ matrix.files }}
        shell: bash
        run: |
          checksum_file="dist/SHA256SUMS-${{ matrix.name }}.txt"
          : > "$checksum_file"
          if command -v shasum >/dev/null 2>&1; then
            while IFS= read -r file; do
              if [ -n "$file" ] && [ -f "$file" ]; then
                shasum -a 256 "$file" >> "$checksum_file"
              fi
            done <<< "$FILES"
          else
            while IFS= read -r file; do
              if [ -n "$file" ] && [ -f "$file" ]; then
                sha256sum "$file" >> "$checksum_file"
              fi
            done <<< "$FILES"
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          FILES: ${{ matrix.files }}
          CHECKSUM_FILE: dist/SHA256SUMS-${{ matrix.name }}.txt
        shell: bash
        run: |
          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              gh release upload "$RELEASE_TAG" "$file" --clobber
            fi
          done <<< "$FILES"
          gh release upload "$RELEASE_TAG" "$CHECKSUM_FILE" --clobber
