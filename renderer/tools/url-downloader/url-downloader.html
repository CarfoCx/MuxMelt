<div class="tool-body">
  <div class="module-banner">
    <strong>Online Video Downloader.</strong> Queue video page URLs and download them into a selected folder.
  </div>
  <div class="url-download-panel">
    <div class="url-download-header">
      <div>
        <h2>Online Video Downloader</h2>
        <p>Paste video page links, queue multiple downloads, and save them into one folder.</p>
      </div>
    </div>

    <div class="settings-bar url-settings">
      <div class="setting-group">
        <label>Output:</label>
        <button class="output-dir-btn" id="outputDirBtn" title="Click to select output directory">
          Downloads/MuxMelt Downloads
        </button>
      </div>
      <div class="setting-group">
        <label>Quality:</label>
        <select id="qualitySelect" class="settings-select url-quality-select">
          <option value="best">Best quality</option>
          <option value="1080p">1080p (MP4)</option>
          <option value="720p">720p (MP4)</option>
          <option value="audioonly">Audio only (MP3)</option>
        </select>
      </div>
    </div>

    <div class="url-list-header">
      <span>Video URL</span>
      <span>Status</span>
      <span></span>
    </div>

    <div class="url-list" id="urlList"></div>

    <button class="add-url-row-btn" id="addUrlBtn" title="Add another video URL">
      <svg class="add-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <span>Add Video URL</span>
    </button>
  </div>
</div>

<div class="tool-footer">
  <div class="tool-footer-left">
    <span class="status-text" id="statusText">Waiting for URL</span>
    <span class="eta-text" id="etaText"></span>
    <div class="processing-indicator" id="processingIndicator">
      <div class="spinner"></div>
      <span>Downloading...</span>
    </div>
  </div>
  <div class="tool-footer-right">
    <button class="btn btn-clear" id="clearBtn">Clear All</button>
    <button class="btn btn-secondary" id="retryBtn" style="display:none;">Retry Failed</button>
    <button class="btn btn-secondary" id="openOutputBtn" style="display:none;">Open Output</button>
    <button class="btn btn-primary" id="downloadBtn">Download</button>
  </div>
</div>
