<!-- Tool body -->
<div class="tool-body">
  <div class="module-banner">
    <strong>Basic Image Editor.</strong> Crop or flip one image at a time.
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">&#128444;</div>
    <div class="drop-zone-text">
      Drag &amp; drop one image for editing
    </div>
    <div class="drop-zone-actions">
      <span class="drop-zone-link" id="browseBtn">browse image</span>
    </div>
    <div class="drop-zone-hint">
      Supports: PNG, JPG, WebP, BMP, TIFF
    </div>
  </div>

  <div class="settings-bar">
    <div class="setting-group">
      <label>Output:</label>
      <button class="output-dir-btn" id="outputDirBtn" title="Click to select output directory">
        Same as source
      </button>
    </div>
  </div>

  <div class="file-list-container">
    <div class="file-list" id="fileList">
      <div class="empty-state">
        No image selected yet. Drag one image above or click browse.
      </div>
    </div>
  </div>
</div>

<div class="editor-overlay" id="editorOverlay"></div>
<div class="editor-modal" id="editorModal">
  <div class="editor-header">
    <span class="editor-title" id="editorTitle">Edit Image</span>
    <button class="editor-close" id="editorClose" title="Close">&times;</button>
  </div>

  <div class="editor-toolbar">
    <button class="editor-tool active" data-tool="crop" title="Crop">Crop</button>
    <button class="editor-tool" data-tool="flip" title="Flip">Flip</button>
  </div>

  <div class="editor-options" id="editorOptions">
    <div class="editor-option-panel active" id="opt-crop">
      <span class="opt-label">Drag on image to select crop area</span>
      <div class="aspect-ratio-presets">
        <button class="aspect-btn active" data-ratio="free">Free</button>
        <button class="aspect-btn" data-ratio="1:1">1:1</button>
        <button class="aspect-btn" data-ratio="16:9">16:9</button>
        <button class="aspect-btn" data-ratio="4:3">4:3</button>
        <button class="aspect-btn" data-ratio="9:16">9:16</button>
      </div>
      <span class="opt-info" id="cropInfo">-</span>
      <button class="btn btn-sm" id="cropResetBtn">Reset Crop</button>
    </div>

    <div class="editor-option-panel" id="opt-flip">
      <button class="btn btn-sm" id="flipH">Flip Horizontal</button>
      <button class="btn btn-sm" id="flipV">Flip Vertical</button>
      <button class="btn btn-sm" id="flipResetBtn">Reset Flip</button>
      <span class="opt-info" id="flipInfo">No flip</span>
    </div>
  </div>

  <div class="editor-canvas-wrap" id="editorCanvasWrap">
    <canvas id="editorCanvas"></canvas>
    <div class="crop-overlay" id="cropOverlay" style="display:none;"></div>
  </div>

  <div class="editor-footer">
    <div class="editor-footer-left">
      <span id="editorImageInfo">-</span>
    </div>
    <div class="editor-footer-right">
      <button class="btn btn-primary" id="edApplyOne">Export Image</button>
    </div>
  </div>
</div>

<div class="tool-footer">
  <div class="tool-footer-left">
    <span class="status-text" id="statusText">Waiting for Image</span>
    <span class="eta-text" id="etaText"></span>
    <div class="processing-indicator" id="processingIndicator">
      <div class="spinner"></div>
      <span>Processing...</span>
    </div>
  </div>
  <div class="tool-footer-right">
    <button class="btn btn-clear" id="clearBtn">Clear</button>
    <button class="btn btn-secondary" id="openOutputBtn" style="display:none;">Open Output</button>
    <button class="btn btn-primary" id="applyBtn" disabled>Edit Image</button>
  </div>
</div>
