<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#15151a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#fcee0a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fcee0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#glow1)"/>
  <rect width="100%" height="100%" fill="url(#glow2)"/>
  <path d="M -200 400 L 1800 1000" stroke="#fcee0a" stroke-width="4" opacity="0.3" filter="drop-shadow(0 0 10px #fcee0a)"/>
  <path d="M -200 600 L 1800 1200" stroke="#00f0ff" stroke-width="4" opacity="0.3" filter="drop-shadow(0 0 10px #00f0ff)"/>
  <polygon points="1200,100 1400,100 1350,200 1150,200" fill="#fcee0a" opacity="0.1"/>
  <polygon points="200,800 400,800 350,900 150,900" fill="#00f0ff" opacity="0.1"/>
</svg>