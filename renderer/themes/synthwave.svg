    <line x1="800" y1="680" x2="520" y2="1200"/>
    <line x1="800" y1="680" x2="240" y2="1200"/>
    <line x1="800" y1="680" x2="-40" y2="1200"/>
    <line x1="800" y1="680" x2="-320" y2="1200"/>
    <line x1="800" y1="680" x2="-600" y2="1200"/>
    <line x1="800" y1="680" x2="1080" y2="1200"/>
    <line x1="800" y1="680" x2="1360" y2="1200"/>
    <line x1="800" y1="680" x2="1640" y2="1200"/>
    <line x1="800" y1="680" x2="1920" y2="1200"/>
    <line x1="800" y1="680" x2="2200" y2="1200"/>
